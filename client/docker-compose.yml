version: "3.9"



services:
  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.140.0
    container_name: otel-agent
    command: ["--config=/etc/otelcol/config.yaml"]
    user: "0:0"
    restart: unless-stopped
    
    volumes:
      # (경로는 사용자 환경에 맞게 유지)
      - ${CONFIG_DIR}/otel-agent-config.yaml:/etc/otelcol/config.yaml:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${APP_LOG_DIR}:${APP_LOG_DIR}:ro

    environment:
      - NODE_ID=${NODE_ID}
      - APP_LOG_DIR=${APP_LOG_DIR}
      # 1. OTel Config 파일 내부에서 쓸 변수들 (${env:변수명} 으로 매핑됨)
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_COLLECTOR_HOST}
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
      - COLLECTION_INTERVAL=${COLLECTION_INTERVAL}
      - MEMORY_LIMIT_MIB=${MEMORY_LIMIT_MIB}

      # 2. Host Metrics 리시버용 경로
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_FILESYSTEM=/host/root

      # 3. 메타데이터 (여기서 조합해서 넘겨주면 Config 파일이 깔끔해짐)
      # service.name, deployment.environment, system.version 등 표준 속성 정의
      - OTEL_RESOURCE_ATTRIBUTES=service.name=${OTEL_LOG_AGENT_NAME},deployment.environment=${DEPLOYMENT_ENV},system.version=${SYSTEM_VERSION}

    network_mode: "host"